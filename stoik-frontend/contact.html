<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Stoik</title>
  <style>
    body { margin: 0; font-family: serif; line-height: 1.6; }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .row { display: flex; flex-wrap: wrap; }
    .col-sm-2, .col-md-3 { flex: 0 0 16.666%; max-width: 16.666%; }
    .col-sm-8, .col-md-6 { flex: 0 0 66.666%; max-width: 66.666%; }
    @media (max-width: 768px) {
      .col-sm-2, .col-md-3 { flex: 0 0 0%; max-width: 0%; }
      .col-sm-8, .col-md-6 { flex: 0 0 100%; max-width: 100%; }
    }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #000; background: transparent; font-family: serif; }
    button { width: 100%; padding: 1rem; background: #000; color: #fff; font-family: serif; border: none; cursor: pointer; }
    .privacy-message { margin-top: 1rem; font-size: 0.9rem; }
    .privacy-message a { text-decoration: underline; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body class="blank">
<header class="header-fixed">
  <div class="container-fluid full-width">
    <div class="row flex-nowrap nav-items">
      <div class="col-2 col-sm-3"><a href="/shop">Shop</a></div>
      <div class="col-8 col-sm-6 text-center" style="padding: 0;">
        <a href="/" class="c-home-logo__image-link" title="Stoik Home">
          <div class="c-home-logo__image" style="height: 40px; background: #000;"></div>
        </a>
      </div>
      <div class="col-2 col-sm-3 c-home-logo--cart">
        <div class="d-flex justify-content-lg-end text-right">
          <div class="user d-none d-lg-block"><a href="/login">LOGIN</a></div>
          <div class="minicart"><a href="/bag">Bag <span class="minicart-quantity">0</span></a></div>
        </div>
      </div>
    </div>
  </div>
</header>
<main id="maincontent">
  <div class="container">
    <div class="row form-content">
      <div class="col-sm-2 col-md-3"></div>
      <div class="col-sm-8 col-md-6">
        <div class="checkout-header mb-3"><h1>Get in touch</h1></div>
        <form id="contactForm" method="POST">
          <div class="form-group required"><label for="firstname">First Name</label><input type="text" id="firstname" name="firstname" required maxlength="50" /></div>
          <div class="form-group required"><label for="lastName">Last Name</label><input type="text" id="lastName" name="lastName" required maxlength="50" /></div>
          <div class="form-group required"><label for="email">Email</label><input type="email" id="email" name="email" required maxlength="100" /></div>
          <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone" name="phone" maxlength="20" /></div>
          <div class="form-group"><label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="">—</option>
              <option value="subscription">Subscription Help</option>
              <option value="delivery">Delivery Question</option>
              <option value="returns">Returns</option>
              <option value="press">Press</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group required"><label for="message">Message</label><textarea id="message" name="message" rows="5" required minlength="1" maxlength="1275"></textarea></div>
          <button type="submit">SUBMIT</button>
          <p class="privacy-message">By clicking Submit, I agree to the <a href="/terms">Terms of Use</a> and have read the <a href="/privacy">Privacy Policy</a>.</p>
        </form>
      </div>
      <div class="col-sm-2 col-md-3"></div>
    </div>
  </div>
</main>
<footer class="c-footer">
  <div class="container">
    <div class="footer-bottom d-flex justify-content-between">
      <div class="left"><a href="/terms">Terms</a> <a href="/privacy">Privacy</a></div>
      <div class="right"><a href="/contact">Contact</a></div>
    </div>
    <div class="footer-copyright text-center" style="margin-top: 2rem;"><small>&copy; 2026 Stoik. Only white inner clothes.</small></div>
  </div>
</footer>
</body>
</html>
