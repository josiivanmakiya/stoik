<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Stoik</title>
  <style>
    body { margin: 0; font-family: serif; line-height: 1.6; }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .row { display: flex; flex-wrap: wrap; }
    .col-sm-8, .col-md-6 { margin: 0 auto; max-width: 500px; width: 100%; }
    .card { border: 1px solid #000; padding: 2rem; margin-top: 4rem; }
    .nav-tabs { display: flex; border-bottom: 1px solid #000; margin-bottom: 2rem; }
    .nav-link { padding: 0.75rem 1rem; text-decoration: none; color: #000; opacity: 0.5; cursor: pointer; }
    .nav-link.active { opacity: 1; font-weight: bold; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.75rem; border: 1px solid #000; background: transparent; font-family: serif; }
    button { width: 100%; padding: 1rem; background: #000; color: #fff; font-family: serif; border: none; cursor: pointer; }
    .forgot-password { font-size: 0.9rem; }
    .privacy-policy { margin-top: 1rem; font-size: 0.9rem; }
    .privacy-policy a { text-decoration: underline; }
    a { color: inherit; text-decoration: none; }
    footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #000; }
    .footer-bottom { display: flex; justify-content: space-between; }
    @media (max-width: 768px) {
      .footer-bottom { flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body class="blank">
<header class="header-fixed">
  <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
    <nav><a href="/shop">Shop</a></nav>
    <a href="/" title="Stoik Home">
      <div style="height: 32px; width: 32px; background: #000;"></div>
    </a>
    <div><a href="/login">LOGIN</a></div>
  </div>
</header>
<main id="maincontent">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-6">
        <div class="card">
          <div class="login-form-nav">
            <ul class="nav nav-tabs" role="tablist">
              <li class="nav-item"><a class="nav-link active" data-tab="login">Login</a></li>
              <li class="nav-item"><a class="nav-link" data-tab="register">Create Account</a></li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane active" id="login-pane">
                <form id="loginForm">
                  <div class="form-group required"><label for="email">Email</label><input type="email" id="email" name="email" required /></div>
                  <div class="form-group required"><label for="password">Password</label><input type="password" id="password" name="password" required /></div>
                  <div class="d-flex justify-content-between"><div class="forgot-password"><a href="/forgot-password">Forgot Password</a></div></div>
                  <button type="submit">LOGIN</button>
                </form>
              </div>
              <div class="tab-pane" id="register-pane">
                <form id="registerForm">
                  <div class="form-group required"><label for="fname">First Name</label><input type="text" id="fname" name="firstName" required maxlength="50" /></div>
                  <div class="form-group required"><label for="lname">Last Name</label><input type="text" id="lname" name="lastName" required maxlength="50" /></div>
                  <div class="form-group required"><label for="phone">Phone Number</label><input type="tel" id="phone" name="phone" required maxlength="20" /></div>
                  <div class="form-group required"><label for="reg-email">Email</label><input type="email" id="reg-email" name="email" required maxlength="50" /></div>
                  <div class="form-group required"><label for="reg-email-confirm">Confirm Email</label><input type="email" id="reg-email-confirm" name="emailConfirm" required maxlength="50" /></div>
                  <div class="form-group required"><label for="reg-password">Password</label><input type="password" id="reg-password" name="password" required minlength="8" /></div>
                  <div class="form-group required"><label for="reg-password-confirm">Confirm Password</label><input type="password" id="reg-password-confirm" name="passwordConfirm" required minlength="8" /></div>
                  <button type="submit">CREATE ACCOUNT</button>
                  <div class="privacy-policy">
                    <p>By clicking Create Account, I agree to the <a href="/terms">Terms of Use</a> and have read the <a href="/privacy">Privacy Policy</a>.</p>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="c-footer">
  <div class="container">
    <div class="footer-bottom">
      <div class="left"><a href="/terms">Terms</a> <a href="/disclosure">Supply Chain Disclosure</a> <a href="/privacy">Privacy</a></div>
      <div class="right"><a href="/contact">Contact</a></div>
    </div>
    <div class="footer-copyright" style="margin-top: 2rem; text-align: center;"><small>&copy; 2026 Stoik. Only white inner clothes.</small></div>
  </div>
</footer>
<script>
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      link.classList.add('active');
      const targetId = link.textContent.trim() === 'Login' ? 'login-pane' : 'register-pane';
      document.getElementById(targetId).classList.add('active');
    });
  });
</script>
</body>
</html>
