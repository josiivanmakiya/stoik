<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stoik | Premium Wardrobe Utility</title>
    <meta
      name="description"
      content="Premium undershirts delivered every 90 days. Recycled by us. Rewarded to you. Join the Stoik Loop for a decision-free wardrobe."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.stoik.com/" />
    <meta property="og:title" content="Stoik | Freshness on Repeat" />
    <meta
      property="og:description"
      content="Your 90-day wardrobe cycle. Wear, recycle, and earn credits toward your next loop."
    />
    <meta property="og:image" content="https://www.stoik.com/og-stoik-fanned-stack.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stoik | Freshness on Repeat" />
    <meta
      name="twitter:description"
      content="Your 90-day wardrobe cycle. Wear, recycle, and earn credits toward your next loop."
    />
    <meta name="twitter:image" content="https://www.stoik.com/og-stoik-fanned-stack.svg" />

    <meta name="apple-mobile-web-app-title" content="Stoik" />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="icon" type="image/jpeg" href="/images/fulda.jpeg" />
    <link rel="apple-touch-icon" href="/images/fulda.jpeg" />
  </head>
  <body>
    <svg
      aria-hidden="true"
      focusable="false"
      width="0"
      height="0"
      style="position: absolute"
    >
      <filter id="stoikGrain">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.68"
          numOctaves="4"
          stitchTiles="stitch"
        />
        <feColorMatrix type="saturate" values="0" />
        <feComponentTransfer>
          <feFuncR type="table" tableValues="0 0.14 0.26 0.4 0.58 0.74" />
          <feFuncG type="table" tableValues="0 0.14 0.26 0.4 0.58 0.74" />
          <feFuncB type="table" tableValues="0 0.14 0.26 0.4 0.58 0.74" />
        </feComponentTransfer>
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
