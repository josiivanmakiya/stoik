<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="160" height="100" role="img" aria-label="Minimal shirt outlines in three colors">
  <rect x="0" y="0" width="320" height="200" fill="#f7f4ef"/>
  <rect x="16" y="16" width="288" height="168" fill="#fbf9f5" stroke="#c9c2b8" stroke-width="2"/>

  <!-- White shirt outline (with subtle halo for visibility) -->
  <g transform="translate(46,46)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M14 8 L26 2 L38 8 L48 20 L36 28 L36 88 L16 88 L16 28 L4 20 Z" stroke="#c9c2b8" stroke-width="5"/>
    <path d="M14 8 L26 2 L38 8 L48 20 L36 28 L36 88 L16 88 L16 28 L4 20 Z" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- Grey shirt outline -->
  <g transform="translate(132,46)" fill="none" stroke="#8e8e8e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M14 8 L26 2 L38 8 L48 20 L36 28 L36 88 L16 88 L16 28 L4 20 Z"/>
  </g>

  <!-- Black shirt outline -->
  <g transform="translate(218,46)" fill="none" stroke="#111111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M14 8 L26 2 L38 8 L48 20 L36 28 L36 88 L16 88 L16 28 L4 20 Z"/>
  </g>
</svg>
